; Cat-O-Fit — PHP-Laufzeitwerte für den Container.

; Apple-Health-Voll-Import: export.zip / export.xml können sehr groß werden.
; (health-import.php streamt per XMLReader, der RAM-Bedarf bleibt klein.)
upload_max_filesize = 1G
post_max_size = 1G
max_execution_time = 300
memory_limit = 256M

; Die .ics-Erzeugung arbeitet mit Europe/Berlin (TZID) — passende Standard-Zeitzone.
date.timezone = Europe/Berlin
