# Cat-O-Fit — Apache-Konfiguration für den Container.

# Unterdrückt die AH00558-Warnung beim Start.
ServerName localhost

# .htaccess der App auswerten (MIME-Typen für ES-Module, Cache-Control,
# data/-Zugriffsschutz) — wie bei der Synology Web Station mit Apache-Backend.
<Directory /var/www/html>
    AllowOverride All
</Directory>

# Gürtel und Hosenträger: data/ ist auch ohne .htaccess nie per HTTP erreichbar.
# (Die API liest die JSON-Dateien über das Dateisystem, nicht über HTTP.)
<Directory /var/www/html/data>
    Require all denied
</Directory>
